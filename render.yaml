services:
  - type: web
    name: remotion-cloud-renderer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: PUPPETEER_DISABLE_HEADLESS_WARNING
        value: "1"
      - key: REMOTION_CHROME_FLAGS
        value: "--disable-dev-shm-usage --no-sandbox --disable-setuid-sandbox --disable-gpu"
    healthCheckPath: /health
