services:
  - type: web
    name: remotion-cloud-renderer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
